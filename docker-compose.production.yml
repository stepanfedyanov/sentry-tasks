services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sentry-tasks:latest
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    command:
      - streamlit
      - run
      - app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s