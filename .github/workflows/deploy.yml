name: CI and Deploy (Scaffold)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile backend/api.py

      - name: Build docker images
        run: docker compose build

      - name: Smoke run
        run: |
          docker compose up -d
          sleep 15
          curl --fail http://localhost:8088/
          curl --fail http://localhost:8088/api-health
          docker compose down -v

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy placeholder
        run: |
          echo "Replace this step with your infra-specific deploy commands"
          echo "Example: ssh host 'cd /srv/sentry-tasks && git pull && docker compose up -d --remove-orphans'"
